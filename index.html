                                React.createElement('h2', { className: "text-xl font-bold text-slate-900" }, "Avaliações"),
                                React.createElement(Badge, { variant: "warning", size: "sm" }, "Confirmadas pós-serviço")
                            ),
                            React.createElement('div', { className: "space-y-6" },
                                p.reviews.map(review =>

                                        React.createElement('div', { className: "flex gap-3" },

                                                        React.createElement('span', { className: "text-xs text-slate-400 ml-2" }, review.data)
                                                    ),

                                            )
                                        )

                    ),

                    // Sidebar - Contato
                    React.createElement('div', { className: "lg:col-span-1" },
                        React.createElement('div', { className: "bg-white rounded-3xl border border-slate-200 p-6 shadow-sm sticky top-24" },
                            React.createElement('h2', { className: "text-lg font-bold text-slate-900 mb-4 flex items-center gap-2" },
                                React.createElement('svg', { className: "w-5 h-5 text-indigo-600", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                                    React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" })
                                ),
                                "Contato direto"
                            ),
                            React.createElement('div', { className: "space-y-4" },
                                React.createElement('div', { className: "flex items-center gap-2 text-sm p-3 rounded-xl bg-emerald-50 border border-emerald-200" },
                                    React.createElement('div', { className: "w-2 h-2 bg-emerald-500 rounded-full animate-pulse" }),
                                    React.createElement('span', { className: "font-medium text-emerald-700" }, "Disponível agora"),
                                    React.createElement('span', { className: "text-emerald-600" }, `• ${p.tempo_resposta}`)
                                ),
                                React.createElement('div', { className: "p-4 rounded-xl bg-indigo-50 border border-indigo-100" },
                                    React.createElement('div', { className: "text-sm text-indigo-700 mb-2" }, "Horário de atendimento"),
                                    React.createElement('div', { className: "font-medium text-indigo-900" }, p.disponibilidade)
                                ),
                                !showContact ?

                                    },
                                        React.createElement('svg', { className: "w-5 h-5", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                                            React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5zm6-10.125a1.875 1.875 0 11-3.75 0 1.875 1.875 0 013.75 0zm1.294 6.336a6.721 6.721 0 01-3.17.789 6.721 6.721 0 01-3.168-.789 3.376 3.376 0 016.338 0z" })
                                        ),

                                    ) :

                                        React.createElement('div', { className: "p-4 rounded-xl bg-white border border-slate-200" },
                                            React.createElement('div', { className: "text-xs text-slate-500 mb-1" }, "WhatsApp"),
                                            React.createElement('div', { className: "font-medium text-slate-900" }, p.telefone)
                                        ),
                                        React.createElement('a', {
                                            href: `https://wa.me/${p.whatsapp}?text=${encodeURIComponent(`Olá ${p.nome}, vi seu perfil no SemLimites e gostaria de contratar seu serviço.`)}`,

                                            className: "w-full px-4 py-3 rounded-xl bg-gradient-to-r from-emerald-600 to-emerald-700 text-white hover:from-emerald-700 hover:to-emerald-800 font-medium shadow-sm hover:shadow transition-all flex items-center justify-center gap-2"
                                        },
                                            React.createElement('svg', { className: "w-5 h-5", fill: "currentColor", viewBox: "0 0 24 24" },
                                                React.createElement('path', { d: "M12.011 2.001C6.5 2 2 6.484 2 11.998c0 2.125.66 4.176 1.9 5.928L2.2 21.6l4.113-1.69c1.698.973 3.678 1.507 5.698 1.507 5.512 0 10.012-4.484 10.012-10.001 0-5.513-4.5-10-10.012-10zM12 19.86c-1.766 0-3.49-.5-4.975-1.438l-.357-.212-2.76 1.132 1.123-2.664-.225-.375A8.837 8.837 0 013.12 12c0-4.88 3.98-8.86 8.88-8.86s8.88 3.98 8.88 8.86-3.98 8.86-8.88 8.86z" }),

        }

        // ========== TELA DE BUSCA ==========
        function TelaBusca({ onVerPerfil }) {
            const [cidade, setCidade] = useState("Bauru");
            const [categoria, setCategoria] = useState("");
            const [buscaTexto, setBuscaTexto] = useState("");
            const [resultados, setResultados] = useState(PRESTADORES);

            const filtrar = () => {
                let lista = [...PRESTADORES];
                if (cidade) lista = lista.filter(p => p.cidade === cidade);
                if (categoria) lista = lista.filter(p => p.categoria === categoria);
                if (buscaTexto.trim()) {
                    const termo = buscaTexto.toLowerCase();
                    lista = lista.filter(p => 
                        p.nome.toLowerCase().includes(termo) ||
                        p.descricao.toLowerCase().includes(termo) ||
                        p.tags.some(tag => tag.toLowerCase().includes(termo))
                    );
                }
                setResultados(lista);
            };

            useEffect(filtrar, [cidade, categoria, buscaTexto]);

            return React.createElement('div', { className: "max-w-7xl mx-auto px-4 py-8" },
                // Header da busca
                React.createElement('div', { className: "bg-white rounded-2xl border border-slate-200 p-6 mb-6" },
                    React.createElement('h1', { className: "text-2xl font-bold text-slate-900 mb-4" }, "Encontre o profissional ideal"),
                    React.createElement('div', { className: "grid md:grid-cols-4 gap-4" },
                        React.createElement('select', {
                            value: cidade,
                            onChange: (e) => setCidade(e.target.value),
                            className: "px-4 py-2 rounded-xl border border-slate-200"
                        }, CIDADES.map(c => React.createElement('option', { key: c }, c))),
                        
                        React.createElement('select', {
                            value: categoria,
                            onChange: (e) => setCategoria(e.target.value),
                            className: "px-4 py-2 rounded-xl border border-slate-200"
                        }, [
                            React.createElement('option', { key: '', value: "" }, "Todas categorias"),
                            ...CATEGORIAS.map(c => React.createElement('option', { key: c }, c))
                        ]),
                        
                        React.createElement('input', {
                            type: "text",
                            value: buscaTexto,
                            onChange: (e) => setBuscaTexto(e.target.value),
                            placeholder: "Buscar...",
                            className: "px-4 py-2 rounded-xl border border-slate-200 md:col-span-2"
                        })
                    )
                ),

                // Resultados
                React.createElement('div', { className: "grid md:grid-cols-2 lg:grid-cols-3 gap-6" },
                    resultados.map(p => React.createElement(CardPrestador, { 
                        key: p.id, 
                        prestador: p, 
                        onVerPerfil: onVerPerfil 
                    }))
                )
            );
        }

        // ========== APP PRINCIPAL ==========
        function App() {
            const [telaAtual, setTelaAtual] = useState("busca");
            const [prestadorSelecionado, setPrestadorSelecionado] = useState(null);

            const verPerfil = (prestador) => {
                setPrestadorSelecionado(prestador);
                setTelaAtual("perfil");
            };

            const voltarParaBusca = () => {
                setTelaAtual("busca");
            };

            return React.createElement('div', { className: "min-h-screen bg-gradient-to-b from-slate-50 to-white" },
                // Header
                React.createElement('header', { className: "bg-white/90 backdrop-blur-lg border-b border-slate-200 sticky top-0 z-50" },
                    React.createElement('div', { className: "max-w-7xl mx-auto px-4 py-3 flex justify-between items-center" },
                        React.createElement('div', {
                            onClick: voltarParaBusca,
                            className: "flex items-center gap-3 cursor-pointer"
                        },
                            React.createElement('div', { className: "relative" },
                                React.createElement('div', { className: "w-10 h-10 rounded-2xl bg-gradient-to-br from-indigo-600 to-indigo-700 text-white grid place-items-center font-bold text-lg" }, "SL"),
                                React.createElement('div', { className: "absolute -bottom-1 -right-1 w-3 h-3 bg-emerald-500 rounded-full border-2 border-white animate-pulse" })
                            ),
                            React.createElement('div', null,
                                React.createElement('span', { className: "font-bold text-lg text-slate-900" }, "SemLimites"),
                                React.createElement('span', { className: "text-xs text-slate-500 block" }, "Prestadores • Bauru e região")
                            )
                        ),
                        React.createElement('div', { className: "flex gap-2" },
                            React.createElement('button', { className: "px-4 py-2 rounded-xl border border-slate-200 text-sm font-medium" }, "Entrar"),
                            React.createElement('button', { className: "px-4 py-2 rounded-xl bg-gradient-to-r from-indigo-600 to-indigo-700 text-white text-sm font-medium" }, "Área do Prestador")
                        )
                    )
                ),
                
                // Conteúdo dinâmico
                telaAtual === "busca" 
                    ? React.createElement(TelaBusca, { onVerPerfil: verPerfil })
                    : React.createElement(TelaPerfil, { prestador: prestadorSelecionado, onVoltar: voltarParaBusca })
            );
        }

        // Renderizar
        ReactDOM.render(React.createElement(App), document.getElementById('root'));
    </script>
</body>
