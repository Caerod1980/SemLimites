<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemLimites Prestadores</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonte Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to bottom, #f8fafc, #ffffff);
            min-height: 100vh;
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <!-- React e ReactDOM -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <script>
        const { useState, useEffect } = React;

        // ========== CONSTANTES ==========
        const CIDADES = ["Bauru", "Piratininga", "Agudos"];
        const CATEGORIAS = [
            "Eletricista", "Encanador", "Diarista", "Pedreiro", 
            "Montador de Móveis", "Ar-condicionado", "Pintor",
            "Jardineiro", "Marceneiro", "Vidraceiro"
        ];
        
        const API_URL = 'https://semlimites-api-rodrigo-b5ckghhkbxdqd7a8.canadacentral-01.azurewebsites.net/api';

        // ========== UTILITÁRIOS ==========
        function cls(...a) {
            return a.filter(Boolean).join(" ");
        }

        // ========== COMPONENTES DE UI ==========
        
        function Stars({ value, size = "md", showNumber = true }) {
            const full = Math.floor(value);
            const half = value - full >= 0.5;
            const total = 5;
            
            const sizeClasses = {
                sm: "text-sm", md: "text-base", lg: "text-xl", xl: "text-2xl"
            };

            return React.createElement('div', { className: "flex items-center gap-1" },
                React.createElement('div', { className: "flex" },
                    Array.from({ length: total }).map((_, i) => {
                        const idx = i + 1;
                        const filled = idx <= full;
                        const isHalf = idx === full + 1 && half;
                        return React.createElement('span', {
                            key: idx,
                            className: (filled || isHalf ? "bg-gradient-to-r from-amber-400 to-amber-500 bg-clip-text text-transparent" : "text-slate-200") + " " + (sizeClasses[size] || "")
                        }, "★");
                    })
                ),
                showNumber && React.createElement('span', { className: "ml-1 text-sm font-semibold text-slate-700" }, value.toFixed(1))
            );
        }

        function Badge({ children, variant = "neutral", size = "sm" }) {
            const variants = {
                neutral: "bg-slate-100 text-slate-700 border-slate-200",
                verified: "bg-gradient-to-r from-emerald-50 to-teal-50 text-emerald-700 border-emerald-200",
                highlight: "bg-gradient-to-r from-indigo-600 to-indigo-700 text-white border-indigo-600"
            };
            
            const sizeClasses = {
                sm: "px-2 py-0.5 text-xs",
                md: "px-2.5 py-1 text-sm",
                lg: "px-3 py-1.5 text-base"
            };

            return React.createElement('span', {
                className: `inline-flex items-center rounded-full border font-medium ${variants[variant]} ${sizeClasses[size]}`
            }, children);
        }

        function Avatar({ name, size = "md" }) {
            const initials = name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
            
            const sizeClasses = {
                sm: "w-8 h-8 text-xs", md: "w-10 h-10 text-sm", lg: "w-12 h-12 text-base",
                xl: "w-16 h-16 text-lg", xxl: "w-24 h-24 text-2xl"
            };

            const colors = [
                "from-blue-500 to-indigo-600", "from-emerald-500 to-teal-600",
                "from-amber-500 to-orange-600", "from-rose-500 to-pink-600"
            ];
            
            const colorIndex = name.length % colors.length;
            
            return React.createElement('div', {
                className: `rounded-2xl bg-gradient-to-br flex items-center justify-center font-semibold text-white shadow-md ${colors[colorIndex]} ${sizeClasses[size]}`
            }, initials);
        }

        // ========== PÁGINA DE AVALIAÇÃO ==========
        function AvaliarServico() {
            const [loading, setLoading] = useState(true);
            const [erro, setErro] = useState('');
            const [servico, setServico] = useState(null);
            const [estrelas, setEstrelas] = useState(0);
            const [comentario, setComentario] = useState('');
            const [enviando, setEnviando] = useState(false);
            const [enviado, setEnviado] = useState(false);
            const [hoverEstrela, setHoverEstrela] = useState(0);

            const token = window.location.pathname.split('/')[2];

            useEffect(() => {
                carregarServico();
            }, []);

            const carregarServico = async () => {
                try {
                    setLoading(true);
                    const response = await fetch(`${API_URL}/servicos/avaliar/${token}`);
                    const data = await response.json();
                    
                    if (!response.ok) throw new Error(data.error || 'Erro ao carregar');
                    
                    setServico(data.servico);
                } catch (error) {
                    setErro(error.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (estrelas === 0) {
                    alert('Selecione uma nota');
                    return;
                }

                try {
                    setEnviando(true);
                    const response = await fetch(`${API_URL}/servicos/avaliar/${token}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ estrelas, comentario })
                    });

                    if (!response.ok) throw new Error('Erro ao enviar');

                    setEnviado(true);
                    setTimeout(() => window.location.href = '/', 3000);
                } catch (error) {
                    setErro(error.message);
                } finally {
                    setEnviando(false);
                }
            };

            if (loading) {
                return React.createElement('div', { className: "min-h-screen flex items-center justify-center" },
                    React.createElement('div', { className: "text-center" },
                        React.createElement('div', { className: "w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto mb-4" }),
                        React.createElement('p', null, "Carregando...")
                    )
                );
            }

            if (erro) {
                return React.createElement('div', { className: "min-h-screen flex items-center justify-center p-4" },
                    React.createElement('div', { className: "max-w-md bg-white rounded-3xl border border-slate-200 p-8 text-center" },
                        React.createElement('h2', { className: "text-2xl font-bold text-red-600 mb-4" }, "Link inválido"),
                        React.createElement('p', { className: "text-slate-600 mb-6" }, erro),
                        React.createElement('a', { href: "/", className: "px-6 py-3 bg-indigo-600 text-white rounded-xl" }, "Voltar")
                    )
                );
            }

            if (enviado) {
                return React.createElement('div', { className: "min-h-screen flex items-center justify-center p-4" },
                    React.createElement('div', { className: "max-w-md bg-white rounded-3xl border border-slate-200 p-8 text-center" },
                        React.createElement('div', { className: "w-20 h-20 rounded-2xl bg-emerald-100 flex items-center justify-center mx-auto mb-6" },
                            React.createElement('svg', { className: "w-10 h-10 text-emerald-600", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                                React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M5 13l4 4L19 7" })
                            )
                        ),
                        React.createElement('h2', { className: "text-2xl font-bold mb-3" }, "Avaliação enviada!"),
                        React.createElement('p', { className: "text-slate-600 mb-6" }, "Obrigado por contribuir com a comunidade."),
                        React.createElement('p', { className: "text-sm text-slate-400" }, "Redirecionando...")
                    )
                );
            }

            return React.createElement('div', { className: "min-h-screen bg-gradient-to-b from-slate-50 to-white p-4" },
                React.createElement('div', { className: "max-w-3xl mx-auto" },
                    React.createElement('div', { className: "bg-white rounded-3xl border border-slate-200 p-8 shadow-sm" },
                        React.createElement('h2', { className: "text-3xl font-bold text-center mb-8" }, "Avalie o serviço"),
                        
                        React.createElement('div', { className: "bg-indigo-50 rounded-2xl p-6 mb-8" },
                            React.createElement('h3', { className: "text-xl font-bold mb-2" }, servico?.prestador?.nome),
                            React.createElement('p', { className: "text-slate-600" }, servico?.titulo),
                            React.createElement('p', { className: "text-sm text-slate-500 mt-2" }, servico?.descricao)
                        ),

                        React.createElement('form', { onSubmit: handleSubmit, className: "space-y-6" },
                            React.createElement('div', null,
                                React.createElement('label', { className: "block text-center text-sm font-medium mb-4" }, "Sua nota para este serviço"),
                                React.createElement('div', { className: "flex justify-center gap-2" },
                                    [1,2,3,4,5].map(v => 
                                        React.createElement('button', {
                                            key: v,
                                            type: "button",
                                            onClick: () => setEstrelas(v),
                                            onMouseEnter: () => setHoverEstrela(v),
                                            onMouseLeave: () => setHoverEstrela(0),
                                            className: "focus:outline-none"
                                        },
                                            React.createElement('svg', {
                                                className: `w-12 h-12 ${v <= (hoverEstrela || estrelas) ? 'text-amber-400' : 'text-slate-300'}`,
                                                fill: "currentColor",
                                                viewBox: "0 0 24 24"
                                            },
                                                React.createElement('path', { d: "M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" })
                                            )
                                        )
                                    )
                                )
                            ),

                            React.createElement('div', null,
                                React.createElement('textarea', {
                                    value: comentario,
                                    onChange: (e) => setComentario(e.target.value),
                                    placeholder: "Deixe seu comentário (opcional)",
                                    rows: 4,
                                    className: "w-full px-4 py-3 rounded-xl border border-slate-200",
                                    maxLength: 500
                                })
                            ),

                            React.createElement('button', {
                                type: "submit",
                                disabled: enviando || estrelas === 0,
                                className: "w-full px-6 py-4 bg-gradient-to-r from-indigo-600 to-indigo-700 text-white font-semibold rounded-xl disabled:opacity-50"
                            }, enviando ? 'Enviando...' : 'Enviar avaliação')
                        )
                    )
                )
            );
        }

        // ========== TELA DE LOGIN ATUALIZADA ==========
        function Login({ onLoginSuccess, onVoltar }) {
            const [email, setEmail] = useState('');
            const [tipo, setTipo] = useState('cliente');
            const [etapa, setEtapa] = useState('form');
            const [loading, setLoading] = useState(false);
            const [erro, setErro] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setErro('');

                try {
                    const response = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, tipo })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Erro no login');
                    }

                    setEtapa('enviado');
                } catch (error) {
                    setErro(error.message);
                } finally {
                    setLoading(false);
                }
            };

            if (etapa === 'enviado') {
                return React.createElement('div', { className: "max-w-md mx-auto px-4 py-12" },
                    React.createElement('div', { className: "bg-white rounded-3xl border border-slate-200 p-8 shadow-sm text-center" },
                        React.createElement('div', { className: "w-16 h-16 rounded-2xl bg-emerald-100 flex items-center justify-center mx-auto mb-4" },
                            React.createElement('svg', { className: "w-8 h-8 text-emerald-600", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                                React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M5 13l4 4L19 7" })
                            )
                        ),
                        React.createElement('h2', { className: "text-xl font-semibold mb-2" }, "Link enviado!"),
                        React.createElement('p', { className: "text-slate-600 mb-6" }, `Enviamos um link para ${email}`),
                        React.createElement('button', {
                            onClick: () => setEtapa('form'),
                            className: "text-indigo-600 hover:text-indigo-800 text-sm"
                        }, "Usar outro e-mail")
                    )
                );
            }

            return React.createElement('div', { className: "max-w-md mx-auto px-4 py-12" },
                React.createElement('div', { className: "bg-white rounded-3xl border border-slate-200 p-8 shadow-sm" },
                    React.createElement('div', { className: "flex items-center justify-between mb-6" },
                        React.createElement('h1', { className: "text-2xl font-bold" }, "Entrar"),
                        React.createElement('button', { onClick: onVoltar, className: "text-sm text-slate-500 hover:text-indigo-600" }, "← Voltar")
                    ),
                    
                    erro && React.createElement('div', { className: "mb-4 p-3 rounded-lg bg-red-50 border border-red-200" },
                        React.createElement('p', { className: "text-sm text-red-600" }, erro)
                    ),
                    
                    React.createElement('form', { onSubmit: handleSubmit, className: "space-y-4" },
                        React.createElement('div', null,
                            React.createElement('label', { className: "block text-sm font-medium mb-1" }, "Tipo de acesso"),
                            React.createElement('div', { className: "flex gap-4" },
                                ['cliente', 'prestador'].map(t => 
                                    React.createElement('label', { key: t, className: "flex items-center gap-2" },
                                        React.createElement('input', {
                                            type: "radio",
                                            value: t,
                                            checked: tipo === t,
                                            onChange: (e) => setTipo(e.target.value),
                                            className: "w-4 h-4 text-indigo-600"
                                        }),
                                        React.createElement('span', { className: "text-sm" }, t === 'cliente' ? 'Cliente' : 'Prestador')
                                    )
                                )
                            )
                        ),

                        React.createElement('div', null,
                            React.createElement('label', { className: "block text-sm font-medium mb-1" }, "E-mail"),
                            React.createElement('input', {
                                type: "email",
                                value: email,
                                onChange: (e) => setEmail(e.target.value),
                                placeholder: "seu@email.com",
                                required: true,
                                className: "w-full px-4 py-3 rounded-xl border border-slate-200"
                            })
                        ),

                        React.createElement('button', {
                            type: "submit",
                            disabled: loading,
                            className: "w-full px-6 py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-indigo-700 text-white font-semibold disabled:opacity-50"
                        }, loading ? 'Enviando...' : 'Enviar link de acesso')
                    )
                )
            );
        }

        // ========== DASHBOARD DO PRESTADOR ==========
        function DashboardPrestador({ usuario, onSair }) {
            const [prestador, setPrestador] = useState(null);
            const [loading, setLoading] = useState(true);
            const [erro, setErro] = useState('');
            const [aba, setAba] = useState('resumo');
            const [editando, setEditando] = useState(false);
            const [formData, setFormData] = useState({});
            const [salvando, setSalvando] = useState(false);

            useEffect(() => {
                carregarDados();
            }, []);

            const carregarDados = async () => {
                try {
                    setLoading(true);
                    const token = localStorage.getItem('token');
                    const response = await fetch(`${API_URL}/prestadores/perfil`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error);
                    setPrestador(data);
                    setFormData(data);
                } catch (error) {
                    setErro(error.message);
                } finally {
                    setLoading(false);
                }
            };

            if (loading) {
                return React.createElement('div', { className: "max-w-7xl mx-auto px-4 py-12 text-center" },
                    React.createElement('div', { className: "w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto mb-4" }),
                    React.createElement('p', null, "Carregando dashboard...")
                );
            }

            if (erro) {
                return React.createElement('div', { className: "max-w-7xl mx-auto px-4 py-12 text-center" },
                    React.createElement('p', { className: "text-red-600" }, erro),
                    React.createElement('button', {
                        onClick: carregarDados,
                        className: "mt-4 px-4 py-2 bg-indigo-600 text-white rounded-xl"
                    }, "Tentar novamente")
                );
            }

            return React.createElement('div', { className: "max-w-7xl mx-auto px-4 py-8" },
                React.createElement('div', { className: "bg-gradient-to-r from-indigo-600 to-indigo-700 rounded-3xl p-8 text-white mb-8" },
                    React.createElement('div', { className: "flex justify-between items-start" },
                        React.createElement('div', null,
                            React.createElement('h1', { className: "text-3xl font-bold mb-2" }, `Olá, ${prestador?.nome || 'Prestador'}!`),
                            React.createElement('p', { className: "text-indigo-100" }, "Gerencie seus serviços e reputação")
                        ),
                        React.createElement('button', {
                            onClick: onSair,
                            className: "px-4 py-2 bg-white/20 hover:bg-white/30 rounded-xl"
                        }, "Sair")
                    )
                ),

                React.createElement('div', { className: "bg-white rounded-2xl border border-slate-200 overflow-hidden mb-8" },
                    React.createElement('div', { className: "border-b border-slate-200 bg-slate-50/50" },
                        React.createElement('div', { className: "flex overflow-x-auto hide-scrollbar" },
                            ['resumo', 'perfil', 'servicos', 'avaliacoes', 'certificacoes'].map(tab =>
                                React.createElement('button', {
                                    key: tab,
                                    onClick: () => setAba(tab),
                                    className: `px-6 py-4 text-sm font-medium whitespace-nowrap ${aba === tab ? 'text-indigo-600 bg-white' : 'text-slate-500'}`
                                }, tab.charAt(0).toUpperCase() + tab.slice(1))
                            )
                        )
                    ),
                    
                    React.createElement('div', { className: "p-6" },
                        aba === 'resumo' && React.createElement('p', null, "Bem-vindo ao seu dashboard!"),
                        aba === 'perfil' && React.createElement('p', null, "Edição de perfil em breve..."),
                        aba === 'servicos' && React.createElement('p', null, "Lista de serviços em breve..."),
                        aba === 'avaliacoes' && React.createElement('p', null, "Avaliações em breve..."),
                        aba === 'certificacoes' && React.createElement('p', null, "Certificações em breve...")
                    )
                )
            );
        }

        // ========== TELA DE BUSCA E PERFIL (VERSÃO SIMPLIFICADA) ==========
        function TelaBusca({ onVerPerfil }) {
            const [cidade, setCidade] = useState("Bauru");
            const [categoria, setCategoria] = useState("");
            const [buscaTexto, setBuscaTexto] = useState("");
            const [resultados, setResultados] = useState([]);
            const [loading, setLoading] = useState(false);
            const [erro, setErro] = useState("");

            const buscarPrestadores = async () => {
                setLoading(true);
                setErro("");
                
                try {
                    let url = `${API_URL}/prestadores/busca?`;
                    const params = [];
                    if (cidade) params.push(`cidade=${encodeURIComponent(cidade)}`);
                    if (categoria) params.push(`categoria=${encodeURIComponent(categoria)}`);
                    if (buscaTexto) params.push(`q=${encodeURIComponent(buscaTexto)}`);
                    
                    url += params.join('&');
                    
                    console.log('🔍 Buscando:', url);
                    
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error || 'Erro na busca');
                    }
                    
                    setResultados(data.prestadores || []);
                } catch (error) {
                    setErro(error.message);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                buscarPrestadores();
            }, [cidade, categoria, buscaTexto]);

            return React.createElement('div', { className: "max-w-7xl mx-auto px-4 py-8" },
                React.createElement('div', { className: "bg-white rounded-2xl border border-slate-200 p-6 mb-6" },
                    React.createElement('h1', { className: "text-2xl font-bold mb-4" }, "Encontre profissionais"),
                    
                    React.createElement('div', { className: "grid md:grid-cols-4 gap-4 mb-4" },
                        React.createElement('select', {
                            value: cidade,
                            onChange: (e) => setCidade(e.target.value),
                            className: "px-4 py-2 rounded-xl border border-slate-200"
                        }, CIDADES.map(c => React.createElement('option', { key: c, value: c }, c))),
                        
                        React.createElement('select', {
                            value: categoria,
                            onChange: (e) => setCategoria(e.target.value),
                            className: "px-4 py-2 rounded-xl border border-slate-200"
                        }, [
                            React.createElement('option', { value: "" }, "Todas as categorias"),
                            ...CATEGORIAS.map(c => React.createElement('option', { key: c, value: c }, c))
                        ]),
                        
                        React.createElement('input', {
                            type: "text",
                            value: buscaTexto,
                            onChange: (e) => setBuscaTexto(e.target.value),
                            placeholder: "Buscar...",
                            className: "px-4 py-2 rounded-xl border border-slate-200 md:col-span-2"
                        })
                    ),
                    
                    React.createElement('button', {
                        onClick: buscarPrestadores,
                        disabled: loading,
                        className: "px-6 py-2 bg-indigo-600 text-white rounded-xl"
                    }, loading ? 'Buscando...' : 'Buscar')
                ),
                
                loading && React.createElement('p', { className: "text-center py-8" }, "Carregando..."),
                erro && React.createElement('p', { className: "text-red-600 text-center py-8" }, erro),
                
                React.createElement('div', { className: "grid md:grid-cols-2 lg:grid-cols-3 gap-6" },
                    resultados.map(p => React.createElement(CardPrestador, { 
                        key: p._id, 
                        prestador: p,
                        onVerPerfil: onVerPerfil
                    }))
                )
            );
        }

        function CardPrestador({ prestador, onVerPerfil }) {
            const p = prestador;
            
            return React.createElement('div', { className: "bg-white rounded-2xl border border-slate-200 p-6 hover:shadow-lg" },
                React.createElement('div', { className: "flex items-start gap-4" },
                    React.createElement(Avatar, { name: p.nome, size: "lg" }),
                    React.createElement('div', { className: "flex-1" },
                        React.createElement('h3', { className: "font-bold text-lg" }, p.nome),
                        React.createElement('p', { className: "text-sm text-slate-500" }, `${p.categoria} • ${p.cidade}`),
                        React.createElement('div', { className: "flex items-center gap-2 mt-2" },
                            React.createElement(Stars, { value: p.estrelas || 0 }),
                            React.createElement('span', { className: "text-xs text-slate-500" }, `(${p.avaliacoes || 0})`)
                        ),
                        React.createElement('button', {
                            onClick: () => onVerPerfil(p),
                            className: "mt-4 px-4 py-2 bg-indigo-600 text-white rounded-xl"
                        }, "Ver perfil")
                    )
                )
            );
        }

        function TelaPerfil({ prestador, onVoltar }) {
            return React.createElement('div', { className: "max-w-3xl mx-auto px-4 py-8" },
                React.createElement('button', {
                    onClick: onVoltar,
                    className: "mb-6 text-indigo-600"
                }, "← Voltar"),
                React.createElement('h1', { className: "text-3xl font-bold mb-4" }, prestador.nome)
            );
        }

        function CadastroPrestador({ onCadastroSucesso, onVoltar }) {
            return React.createElement('div', { className: "max-w-md mx-auto px-4 py-8 text-center" },
                React.createElement('h1', { className: "text-2xl font-bold mb-4" }, "Cadastro em breve..."),
                React.createElement('button', { onClick: onVoltar, className: "text-indigo-600" }, "Voltar")
            );
        }

        // ========== APP PRINCIPAL ==========
        function App() {
            const [modo, setModo] = useState('busca');
            const [usuario, setUsuario] = useState(null);
            const [prestadorSelecionado, setPrestadorSelecionado] = useState(null);

            useEffect(() => {
                const path = window.location.pathname;
                if (path.startsWith('/avaliar/')) {
                    setModo('avaliar');
                }
                
                const token = localStorage.getItem('token');
                if (token) {
                    fetch(`${API_URL}/auth/me`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (!data.error) setUsuario(data);
                    })
                    .catch(console.error);
                }
            }, []);

            const voltarParaBusca = () => {
                window.history.pushState({}, '', '/');
                setModo('busca');
            };

            return React.createElement('div', { className: "min-h-screen bg-gradient-to-b from-slate-50 to-white" },
                modo !== 'avaliar' && React.createElement('header', { className: "bg-white/90 backdrop-blur-lg border-b border-slate-200 sticky top-0 z-50" },
                    React.createElement('div', { className: "max-w-7xl mx-auto px-4 py-3 flex justify-between items-center" },
                        React.createElement('div', {
                            onClick: voltarParaBusca,
                            className: "flex items-center gap-3 cursor-pointer"
                        },
                            React.createElement('div', { className: "w-10 h-10 rounded-2xl bg-gradient-to-br from-indigo-600 to-indigo-700 text-white grid place-items-center font-bold" }, "SL"),
                            React.createElement('h1', { className: "font-bold text-lg" }, "SemLimites")
                        ),
                        
                        React.createElement('div', { className: "flex gap-3" },
                            !usuario ? (
                                React.createElement('button', {
                                    onClick: () => setModo('login'),
                                    className: "px-4 py-2 rounded-xl border border-slate-200 hover:bg-slate-50"
                                }, "Entrar")
                            ) : (
                                React.createElement('button', {
                                    onClick: () => setModo('dashboard'),
                                    className: "px-4 py-2 rounded-xl bg-indigo-600 text-white"
                                }, "Dashboard")
                            ),
                            React.createElement('button', {
                                onClick: () => setModo(modo === 'busca' ? 'cadastro' : 'busca'),
                                className: "px-4 py-2 rounded-xl bg-gradient-to-r from-emerald-600 to-emerald-700 text-white"
                            }, modo === 'busca' ? 'Sou Prestador' : 'Ver Busca')
                        )
                    )
                ),
                
                modo === 'busca' && React.createElement(TelaBusca, { onVerPerfil: (p) => { setPrestadorSelecionado(p); setModo('perfil'); } }),
                modo === 'perfil' && React.createElement(TelaPerfil, { prestador: prestadorSelecionado, onVoltar: voltarParaBusca }),
                modo === 'login' && React.createElement(Login, { onLoginSuccess: () => setModo('dashboard'), onVoltar: voltarParaBusca }),
                modo === 'cadastro' && React.createElement(CadastroPrestador, { onCadastroSucesso: voltarParaBusca, onVoltar: voltarParaBusca }),
                modo === 'dashboard' && React.createElement(DashboardPrestador, { 
                    usuario: usuario, 
                    onSair: () => { 
                        localStorage.removeItem('token'); 
                        setUsuario(null); 
                        voltarParaBusca(); 
                    } 
                }),
                modo === 'avaliar' && React.createElement(AvaliarServico)
            );
        }

        ReactDOM.render(React.createElement(App), document.getElementById('root'));
    </script>
</body>
</html>
