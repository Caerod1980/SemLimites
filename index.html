    <!-- Script para lidar com rotas no GitHub Pages -->

    <style>

</head>
<body>
    <div id="root"></div>
    
    <!-- React e ReactDOM -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <script>
        var _React = React;
        var useState = _React.useState;
        var useEffect = _React.useEffect;

        // ========== CONSTANTES ==========
        var CIDADES = ["Bauru", "Piratininga", "Agudos"];
        var CATEGORIAS = [
            "Eletricista", "Encanador", "Diarista", "Pedreiro", 
            "Montador de Móveis", "Ar-condicionado", "Pintor",
            "Jardineiro", "Marceneiro", "Vidraceiro"
        ];
        
        var API_URL = 'https://semlimites-api-rodrigo-b5ckghhkbxdqd7a8.canadacentral-01.azurewebsites.net/api';
        var BASE_PATH = '/SemLimites';

        // ========== UTILITÁRIOS ==========
        function cls() {
            var args = Array.prototype.slice.call(arguments);
            var result = [];
            for (var i = 0; i < args.length; i++) {
                if (args[i]) {
                    result.push(args[i]);
                }
            }
            return result.join(" ");
        }

        // ========== COMPONENTES DE UI ==========
        
        function Stars(props) {
            var value = props.value || 0;
            var size = props.size || "md";
            var showNumber = props.showNumber !== false;
            
            var full = Math.floor(value);
            var half = value - full >= 0.5;
            
            var sizeClasses = {
                sm: "text-sm", 
                md: "text-base", 
                lg: "text-xl", 
                xl: "text-2xl"
            };

            var stars = [];
            for (var i = 1; i <= 5; i++) {
                var className = "text-slate-200";
                if (i <= full) {
                    className = "bg-gradient-to-r from-amber-400 to-amber-500 bg-clip-text text-transparent";
                } else if (i === full + 1 && half) {
                    className = "bg-gradient-to-r from-amber-400 to-amber-500 bg-clip-text text-transparent";
                }
                className = className + " " + (sizeClasses[size] || "");
                stars.push(React.createElement('span', { key: i, className: className }, "★"));
            }

            var numberElement = null;
            if (showNumber) {
                numberElement = React.createElement('span', { className: "ml-1 text-sm font-semibold text-slate-700" }, value.toFixed(1));
            }

            return React.createElement('div', { className: "flex items-center gap-1" },
                React.createElement('div', { className: "flex" }, stars),
                numberElement
            );
        }

        function Badge(props) {
            var children = props.children;
            var variant = props.variant || "neutral";
            var size = props.size || "sm";
            
            var variants = {
                neutral: "bg-slate-100 text-slate-700 border-slate-200",
                verified: "bg-gradient-to-r from-emerald-50 to-teal-50 text-emerald-700 border-emerald-200",
                highlight: "bg-gradient-to-r from-indigo-600 to-indigo-700 text-white border-indigo-600"
            };
            
            var sizeClasses = {
                sm: "px-2 py-0.5 text-xs",
                md: "px-2.5 py-1 text-sm",
                lg: "px-3 py-1.5 text-base"
            };

            var className = "inline-flex items-center rounded-full border font-medium " + variants[variant] + " " + sizeClasses[size];
            
            return React.createElement('span', { className: className }, children);
        }

        function Avatar(props) {
            var name = props.name || "";
            var size = props.size || "md";
            
            var nameParts = name.split(' ');
            var initialsArray = [];
            for (var i = 0; i < nameParts.length; i++) {
                if (nameParts[i].length > 0) {
                    initialsArray.push(nameParts[i][0]);
                }
            }
            var initials = initialsArray.join('').slice(0, 2).toUpperCase();
            
            var sizeClasses = {
                sm: "w-8 h-8 text-xs", 
                md: "w-10 h-10 text-sm", 
                lg: "w-12 h-12 text-base",
                xl: "w-16 h-16 text-lg", 
                xxl: "w-24 h-24 text-2xl"
            };

            var colors = [
                "from-blue-500 to-indigo-600", 
                "from-emerald-500 to-teal-600",
                "from-amber-500 to-orange-600", 
                "from-rose-500 to-pink-600"
            ];
            
            var colorIndex = name.length % colors.length;
            
            var className = "rounded-2xl bg-gradient-to-br flex items-center justify-center font-semibold text-white shadow-md " + colors[colorIndex] + " " + sizeClasses[size];
            
            return React.createElement('div', { className: className }, initials);
        }

        // ========== COMPONENTE DE SERVIÇOS DO PRESTADOR ==========
        function ServicosPrestador(props) {
            var prestadorId = props.prestadorId;
            var [servicos, setServicos] = useState([]);
            var [loading, setLoading] = useState(true);

            useEffect(function() {
                if (!prestadorId) {
                    return;
                }
                
                fetch(API_URL + '/servicos/prestador/' + prestadorId + '?limit=5')
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (data.servicos) {
                            setServicos(data.servicos);
                        }
                        setLoading(false);
                    })
                    .catch(function(error) {
                        console.error('Erro ao carregar serviços:', error);
                        setLoading(false);
                    });
            }, [prestadorId]);

            if (loading) {
                return React.createElement('div', { className: "text-center py-4" },
                    React.createElement('div', { className: "w-8 h-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto mb-2" }),
                    React.createElement('p', { className: "text-sm text-slate-500" }, "Carregando serviços...")
                );
            }

            if (servicos.length === 0) {
                return React.createElement('div', { className: "text-center py-8 text-slate-500" },
                    React.createElement('svg', { className: "w-12 h-12 text-slate-300 mx-auto mb-3", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                        React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" })
                    ),
                    React.createElement('p', { className: "text-sm" }, "Nenhum serviço avaliado ainda.")
                );
            }

            var servicosElements = [];
            for (var i = 0; i < servicos.length; i++) {
                var s = servicos[i];
                
                var estrelasElements = [];
                for (var e = 1; e <= 5; e++) {
                    var estrelaClass = "w-4 h-4 text-slate-300";
                    if (s.avaliacao && s.avaliacao.estrelas) {
                        if (e <= s.avaliacao.estrelas) {
                            estrelaClass = "w-4 h-4 text-amber-400";
                        }
                    }
                    
                    estrelasElements.push(
                        React.createElement('svg', {
                            key: e,
                            className: estrelaClass,
                            fill: "currentColor",
                            viewBox: "0 0 20 20"
                        },
                            React.createElement('path', { d: "M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" })
                        )
                    );
                }

                var comentarioElement = null;
                if (s.avaliacao && s.avaliacao.comentario) {
                    comentarioElement = React.createElement('p', { 
                        className: "text-sm text-slate-700 italic mt-2 border-t border-slate-200 pt-2" 
                    }, '"' + s.avaliacao.comentario + '"');
                }

                var dataTexto = "Data não informada";
                if (s.dataRealizacao) {
                    var data = new Date(s.dataRealizacao);
                    dataTexto = data.toLocaleDateString('pt-BR');
                }

                servicosElements.push(
                    React.createElement('div', { 
                        key: s._id, 
                        className: "bg-slate-50 rounded-xl p-4 border border-slate-200 hover:border-indigo-200 transition"
                    },
                        React.createElement('div', { className: "flex justify-between items-start mb-2" },
                            React.createElement('h4', { className: "font-medium text-slate-900" }, s.titulo),
                            React.createElement('div', { className: "flex items-center gap-1" }, estrelasElements)
                        ),
                        React.createElement('p', { className: "text-sm text-slate-600 mb-2" }, s.descricao),
                        React.createElement('p', { className: "text-xs text-slate-500 mb-2" },
                            "Cliente: " + (s.clienteNome || 'Cliente') + " • " + dataTexto
                        ),
                        comentarioElement
                    )
                );
            }

            return React.createElement('div', { className: "space-y-3" }, servicosElements);
        }

        // ========== PÁGINA DE AVALIAÇÃO ==========
        function AvaliarServico() {
            var [loading, setLoading] = useState(true);
            var [erro, setErro] = useState('');
            var [servico, setServico] = useState(null);
            var [estrelas, setEstrelas] = useState(0);
            var [comentario, setComentario] = useState('');
            var [enviando, setEnviando] = useState(false);
            var [enviado, setEnviado] = useState(false);

            var pathParts = window.location.pathname.split('/');
            var token = pathParts[3] || pathParts[2];

            useEffect(function() {
                fetch(API_URL + '/servicos/avaliar/' + token)
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (data.servico) {
                            setServico(data.servico);
                        } else {
                            setErro('Link inválido ou expirado');
                        }
                        setLoading(false);
                    })
                    .catch(function(error) {
                        setErro(error.message);
                        setLoading(false);
                    });
            }, []);

            function handleSubmit(e) {
                e.preventDefault();
                if (estrelas === 0) {
                    alert('Selecione uma nota de 1 a 5 estrelas');
                    return;
                }

                setEnviando(true);

                fetch(API_URL + '/servicos/avaliar/' + token, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ estrelas: estrelas, comentario: comentario })
                })
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (data.success) {
                            setEnviado(true);
                            setTimeout(function() { navigate('/'); }, 3000);
                        } else {
                            setErro(data.error || 'Erro ao enviar avaliação');
                        }
                        setEnviando(false);
                    })
                    .catch(function(error) {
                        setErro(error.message);
                        setEnviando(false);
                    });
            }

            if (loading) {
                return React.createElement('div', { className: "min-h-screen flex items-center justify-center" },
                    React.createElement('div', { className: "text-center" },
                        React.createElement('div', { className: "w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto mb-4" }),
                        React.createElement('p', { className: "text-slate-600" }, "Carregando...")
                    )
                );
            }

            if (erro) {
                return React.createElement('div', { className: "min-h-screen flex items-center justify-center p-4" },
                    React.createElement('div', { className: "max-w-md bg-white rounded-3xl border border-slate-200 p-8 text-center" },
                        React.createElement('div', { className: "w-20 h-20 rounded-2xl bg-red-100 flex items-center justify-center mx-auto mb-6" },
                            React.createElement('svg', { className: "w-10 h-10 text-red-600", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                                React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" })
                            )
                        ),
                        React.createElement('h2', { className: "text-2xl font-bold text-red-600 mb-4" }, "Link inválido ou expirado"),
                        React.createElement('p', { className: "text-slate-600 mb-6" }, erro),
                        React.createElement('button', {
                            onClick: function() { navigate('/'); },
                            className: "px-6 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700"
                        }, "Ir para a página inicial")
                    )
                );
            }

            if (enviado) {
                return React.createElement('div', { className: "min-h-screen flex items-center justify-center p-4" },
                    React.createElement('div', { className: "max-w-md bg-white rounded-3xl border border-slate-200 p-8 text-center animate-fadeIn" },
                        React.createElement('div', { className: "w-20 h-20 rounded-2xl bg-emerald-100 flex items-center justify-center mx-auto mb-6" },
                            React.createElement('svg', { className: "w-10 h-10 text-emerald-600", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                                React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M5 13l4 4L19 7" })
                            )
                        ),
                        React.createElement('h2', { className: "text-2xl font-bold text-slate-900 mb-3" }, "Avaliação enviada!"),
                        React.createElement('p', { className: "text-slate-600 mb-6" }, "Obrigado por contribuir com a comunidade SemLimites."),
                        React.createElement('p', { className: "text-sm text-slate-400" }, "Redirecionando...")
                    )
                );
            }

            var prestadorNome = "Profissional";
            var prestadorCategoria = "Profissional";
            var prestadorCidade = "";
            var servicoTitulo = "";
            var servicoDescricao = "";
            var servicoData = "";

            if (servico) {
                if (servico.prestador) {
                    prestadorNome = servico.prestador.nome || "Profissional";
                    prestadorCategoria = servico.prestador.categoria || "Profissional";
                    prestadorCidade = servico.prestador.cidade || "";
                }
                servicoTitulo = servico.titulo || "";
                servicoDescricao = servico.descricao || "";
                if (servico.dataRealizacao) {
                    var dataObj = new Date(servico.dataRealizacao);
                    servicoData = "Realizado em: " + dataObj.toLocaleDateString('pt-BR');
                }
            }

            var estrela1Class = "w-10 h-10 md:w-14 md:h-14 text-slate-300";
            var estrela2Class = "w-10 h-10 md:w-14 md:h-14 text-slate-300";
            var estrela3Class = "w-10 h-10 md:w-14 md:h-14 text-slate-300";
            var estrela4Class = "w-10 h-10 md:w-14 md:h-14 text-slate-300";
            var estrela5Class = "w-10 h-10 md:w-14 md:h-14 text-slate-300";

            if (estrelas >= 1) estrela1Class = "w-10 h-10 md:w-14 md:h-14 text-amber-400";
            if (estrelas >= 2) estrela2Class = "w-10 h-10 md:w-14 md:h-14 text-amber-400";
            if (estrelas >= 3) estrela3Class = "w-10 h-10 md:w-14 md:h-14 text-amber-400";
            if (estrelas >= 4) estrela4Class = "w-10 h-10 md:w-14 md:h-14 text-amber-400";
            if (estrelas >= 5) estrela5Class = "w-10 h-10 md:w-14 md:h-14 text-amber-400";

            var botaoTexto = "Enviar avaliação";
            if (enviando) {
                botaoTexto = "Enviando...";
            }

            return React.createElement('div', { className: "min-h-screen bg-gradient-to-b from-slate-50 to-white p-4" },
                React.createElement('div', { className: "max-w-3xl mx-auto" },
                    React.createElement('div', { className: "bg-white rounded-3xl border border-slate-200 p-8 shadow-sm" },
                        React.createElement('h2', { className: "text-3xl font-bold text-center mb-8" }, "Avalie o serviço"),
                        
                        React.createElement('div', { className: "bg-gradient-to-r from-indigo-50 to-white rounded-2xl p-6 mb-8 border border-indigo-100" },
                            React.createElement('div', { className: "flex items-center gap-4 mb-4" },
                                React.createElement('div', { className: "w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-600 to-indigo-700 text-white flex items-center justify-center text-2xl font-bold" },
                                    prestadorNome.charAt(0)
                                ),
                                React.createElement('div', null,
                                    React.createElement('h3', { className: "text-xl font-bold text-slate-900" }, prestadorNome),
                                    React.createElement('p', { className: "text-sm text-indigo-600" }, 
                                        prestadorCategoria + " • " + prestadorCidade
                                    )
                                )
                            ),
                            React.createElement('div', { className: "border-t border-indigo-100 pt-4" },
                                React.createElement('p', { className: "text-sm text-slate-500 mb-1" }, "Serviço contratado:"),
                                React.createElement('p', { className: "font-medium text-slate-900 mb-2" }, servicoTitulo),
                                React.createElement('p', { className: "text-sm text-slate-600" }, servicoDescricao),
                                React.createElement('p', { className: "text-xs text-slate-400 mt-2" }, servicoData)
                            )
                        ),

                        React.createElement('form', { onSubmit: handleSubmit, className: "space-y-6" },
                            React.createElement('div', null,
                                React.createElement('label', { className: "block text-center text-lg font-medium mb-4" }, 
                                    "Como você avalia este serviço?"
                                ),
                                React.createElement('div', { className: "flex justify-center gap-2 md:gap-4" },
                                    React.createElement('button', {
                                        type: "button",
                                        onClick: function() { setEstrelas(1); },
                                        className: "focus:outline-none transform hover:scale-110 transition"
                                    },
                                        React.createElement('svg', {
                                            className: estrela1Class,
                                            fill: "currentColor",
                                            viewBox: "0 0 24 24"
                                        },
                                            React.createElement('path', { d: "M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" })
                                        )
                                    ),
                                    React.createElement('button', {
                                        type: "button",
                                        onClick: function() { setEstrelas(2); },
                                        className: "focus:outline-none transform hover:scale-110 transition"
                                    },
                                        React.createElement('svg', {
                                            className: estrela2Class,
                                            fill: "currentColor",
                                            viewBox: "0 0 24 24"
                                        },
                                            React.createElement('path', { d: "M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" })
                                        )
                                    ),
                                    React.createElement('button', {
                                        type: "button",
                                        onClick: function() { setEstrelas(3); },
                                        className: "focus:outline-none transform hover:scale-110 transition"
                                    },
                                        React.createElement('svg', {
                                            className: estrela3Class,
                                            fill: "currentColor",
                                            viewBox: "0 0 24 24"
                                        },
                                            React.createElement('path', { d: "M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" })
                                        )
                                    ),
                                    React.createElement('button', {
                                        type: "button",
                                        onClick: function() { setEstrelas(4); },
                                        className: "focus:outline-none transform hover:scale-110 transition"
                                    },
                                        React.createElement('svg', {
                                            className: estrela4Class,
                                            fill: "currentColor",
                                            viewBox: "0 0 24 24"
                                        },
                                            React.createElement('path', { d: "M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" })
                                        )
                                    ),
                                    React.createElement('button', {
                                        type: "button",
                                        onClick: function() { setEstrelas(5); },
                                        className: "focus:outline-none transform hover:scale-110 transition"
                                    },
                                        React.createElement('svg', {
                                            className: estrela5Class,
                                            fill: "currentColor",
                                            viewBox: "0 0 24 24"
                                        },
                                            React.createElement('path', { d: "M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" })
                                        )
                                    )
                                )
                            ),

                            React.createElement('div', null,
                                React.createElement('label', { className: "block text-sm font-medium mb-2" }, 
                                    "Deixe seu comentário (opcional)"
                                ),
                                React.createElement('textarea', {
                                    value: comentario,
                                    onChange: function(e) { setComentario(e.target.value); },
                                    placeholder: "Conte-nos sobre sua experiência...",
                                    rows: 4,
                                    maxLength: 500,
                                    className: "w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50"
                                }),
                                React.createElement('p', { className: "text-xs text-slate-400 text-right mt-1" },
                                    comentario.length + "/500 caracteres"
                                )
                            ),

                            React.createElement('button', {
                                type: "submit",
                                disabled: enviando || estrelas === 0,
                                className: "w-full px-6 py-4 bg-gradient-to-r from-indigo-600 to-indigo-700 text-white font-semibold rounded-xl disabled:opacity-50 disabled:cursor-not-allowed hover:shadow-lg transition"
                            }, botaoTexto)
                        )
                    )
                )
            );
        }

        // ========== TELA DE LOGIN ==========
        function Login(props) {
            var onLoginSuccess = props.onLoginSuccess;
            var onVoltar = props.onVoltar;

                            ),
                            React.createElement('span', { className: "text-sm font-medium" }, "Resposta")
                        ),
                        React.createElement('div', { className: "text-2xl font-bold text-slate-900" }, prestador.tempoResposta || "~30"),

                    )
                ),

                // Abas
                React.createElement('div', { className: "bg-white rounded-2xl border border-slate-200 overflow-hidden" },
                    React.createElement('div', { className: "border-b border-slate-200 bg-slate-50/50" },
                        React.createElement('div', { className: "flex overflow-x-auto hide-scrollbar" },
                            React.createElement('button', {

        // ========== TELA DE BUSCA ==========
        function TelaBusca(props) {
            var onVerPerfil = props.onVerPerfil;
            
            var [cidade, setCidade] = useState("Bauru");
            var [categoria, setCategoria] = useState("");
            var [buscaTexto, setBuscaTexto] = useState("");
            var [resultados, setResultados] = useState([]);
            var [loading, setLoading] = useState(false);
            var [erro, setErro] = useState("");

            function buscar() {
                setLoading(true);
                setErro("");
                
                var url = API_URL + '/prestadores/busca?';
                var params = [];
                if (cidade) {
                    params.push('cidade=' + encodeURIComponent(cidade));
                }
                if (categoria) {
                    params.push('categoria=' + encodeURIComponent(categoria));
                }
                if (buscaTexto) {
                    params.push('q=' + encodeURIComponent(buscaTexto));
                }
                
                url = url + params.join('&');
                
                fetch(url)
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (data.prestadores) {
                            setResultados(data.prestadores);
                        } else {
                            setResultados([]);
                        }
                        setLoading(false);
                    })
                    .catch(function(error) {
                        setErro(error.message);
                        setLoading(false);
                    });
            }

            useEffect(function() {
                var timer = setTimeout(function() {
                    buscar();
                }, 500);
                return function() { clearTimeout(timer); };
            }, [cidade, categoria, buscaTexto]);

            var cidadeOptions = [];
            for (var i = 0; i < CIDADES.length; i++) {
                cidadeOptions.push(React.createElement('option', { key: CIDADES[i], value: CIDADES[i] }, CIDADES[i]));
            }

            var categoriaOptions = [];
            categoriaOptions.push(React.createElement('option', { key: "empty", value: "" }, "Todas as categorias"));
            for (var j = 0; j < CATEGORIAS.length; j++) {
                categoriaOptions.push(React.createElement('option', { key: CATEGORIAS[j], value: CATEGORIAS[j] }, CATEGORIAS[j]));
            }

            var resultadosElements = [];
            if (resultados.length === 0) {
                resultadosElements.push(
                    React.createElement('div', { key: "empty", className: "col-span-full text-center py-12 text-slate-500" },
                        "Nenhum prestador encontrado"
                    )
                );
            } else {
                for (var k = 0; k < resultados.length; k++) {
                    resultadosElements.push(
                        React.createElement(CardPrestador, { 
                            key: resultados[k]._id, 
                            prestador: resultados[k],
                            onVerPerfil: onVerPerfil
                        })
                    );
                }
            }

            var loadingElement = null;
            if (loading) {
                loadingElement = React.createElement('div', { className: "text-center py-8" },
                    React.createElement('div', { 
                        className: "w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto mb-4" 
                    }),
                    React.createElement('p', { className: "text-slate-600" }, "Buscando prestadores...")
                );
            }

            var erroElement = null;
            if (erro) {
                erroElement = React.createElement('div', { className: "text-red-600 text-center py-8" }, erro);
            }

            var resultadosElement = null;
            if (!loading && !erro) {
                resultadosElement = React.createElement('div', { className: "grid md:grid-cols-2 lg:grid-cols-3 gap-6" }, resultadosElements);
            }

            return React.createElement('div', { className: "max-w-7xl mx-auto px-4 py-8" },
                React.createElement('div', { className: "bg-white rounded-2xl border border-slate-200 p-6 mb-6" },
                    React.createElement('h1', { className: "text-2xl font-bold text-slate-900 mb-4" }, 
                        "Encontre profissionais"
                    ),
                    
                    React.createElement('div', { className: "grid md:grid-cols-4 gap-4" },
                        React.createElement('select', {
                            value: cidade,
                            onChange: function(e) { setCidade(e.target.value); },
                            className: "px-4 py-2 rounded-xl border border-slate-200"
                        }, cidadeOptions),
                        
                        React.createElement('select', {
                            value: categoria,
                            onChange: function(e) { setCategoria(e.target.value); },
                            className: "px-4 py-2 rounded-xl border border-slate-200"
                        }, categoriaOptions),
                        
                        React.createElement('input', {
                            type: "text",
                            value: buscaTexto,
                            onChange: function(e) { setBuscaTexto(e.target.value); },
                            placeholder: "Buscar por nome ou serviço...",
                            className: "px-4 py-2 rounded-xl border border-slate-200 md:col-span-2"
                        })
                    )
                ),

                loadingElement,
                erroElement,
                resultadosElement
            );
        }

        // ========== CARD DE PRESTADOR ==========
        function CardPrestador(props) {
            var prestador = props.prestador;
            var onVerPerfil = props.onVerPerfil;
            
            var p = prestador;
            
            function handleClick() {
                if (onVerPerfil) {
                    onVerPerfil(p);
                }
            }

            var categoriaTexto = p.categoria || 'Profissional';
            var cidadeTexto = p.cidade || 'Cidade não informada';
            var descricaoTexto = p.descricao || 'Sem descrição';

            return React.createElement('div', { 
                className: "bg-white rounded-2xl border border-slate-200 p-6 hover:shadow-lg transition-all hover:border-indigo-200" 
            },
                React.createElement('div', { className: "flex items-start gap-4" },
                    React.createElement(Avatar, { name: p.nome, size: "lg" }),
                    React.createElement('div', { className: "flex-1" },
                        React.createElement('h3', { className: "font-bold text-lg text-slate-900" }, p.nome),
                        React.createElement('p', { className: "text-sm text-slate-500 mt-1" }, 
                            categoriaTexto + ' • ' + cidadeTexto
                        ),
                        React.createElement('div', { className: "flex items-center gap-2 mt-2" },
                            React.createElement(Stars, { value: p.estrelas || 0 }),
                            React.createElement('span', { className: "text-xs text-slate-500" }, 
                                '(' + (p.avaliacoes || 0) + ' avaliações)'
                            )
                        ),
                        React.createElement('p', { className: "mt-3 text-sm text-slate-600 line-clamp-2" }, 
                            descricaoTexto
                        ),
                        React.createElement('button', {
                            onClick: handleClick,
                            className: "mt-4 px-4 py-2 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 text-sm font-medium"
                        }, "Ver perfil")
                    )
                )
            );
        }

        // ========== TELA DE PERFIL SIMPLIFICADA ==========
        function TelaPerfil(props) {
            var prestador = props.prestador;
            var onVoltar = props.onVoltar;
            
            if (!prestador) {
                return React.createElement('div', { className: "max-w-7xl mx-auto px-4 py-8 text-center" },
                    React.createElement('p', { className: "text-red-600" }, "Prestador não encontrado"),
                    React.createElement('button', {
                        onClick: onVoltar,
                        className: "mt-4 px-4 py-2 bg-indigo-600 text-white rounded-xl"
                    }, "Voltar")
                );
            }

            return React.createElement('div', { className: "max-w-7xl mx-auto px-4 py-8" },
                React.createElement('button', {
                    onClick: onVoltar,
                    className: "mb-6 text-indigo-600 hover:text-indigo-800 flex items-center gap-2"
                },
                    React.createElement('svg', { className: "w-5 h-5", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                        React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M10 19l-7-7m0 0l7-7m-7 7h18" })
                    ),
                    "Voltar para busca"
                ),
                React.createElement('div', { className: "bg-white rounded-3xl border border-slate-200 p-8" },
                    React.createElement('h1', { className: "text-2xl font-bold" }, prestador.nome || "Profissional")
                )
            );
        }

        // ========== FUNÇÃO DE NAVEGAÇÃO ==========
        function navigate(path) {
            var fullPath = BASE_PATH + path;
            window.history.pushState({}, '', fullPath);
            
            if (path.startsWith('/avaliar/')) {
                window.appSetModo('avaliar');
            } else if (path === '/login') {
                window.appSetModo('login');
            } else if (path === '/cadastro') {
                window.appSetModo('cadastro');
            } else if (path === '/dashboard') {
                window.appSetModo('dashboard');
            } else if (path === '/perfil') {
                window.appSetModo('perfil');
            } else {
                window.appSetModo('busca');
            }
        }

        // ========== APP PRINCIPAL ==========
        function App() {
            var [modo, setModo] = useState('busca');
            var [usuario, setUsuario] = useState(null);
            var [prestadorSelecionado, setPrestadorSelecionado] = useState(null);

            window.appSetModo = setModo;

            useEffect(function() {
                var path = window.location.pathname.replace(BASE_PATH, '') || '/';
                
                if (path.startsWith('/avaliar/')) {
                    setModo('avaliar');
                } else if (path === '/login') {
                    setModo('login');
                } else if (path === '/cadastro') {
                    setModo('cadastro');
                } else if (path === '/dashboard') {
                    setModo('dashboard');
                } else {
                    setModo('busca');
                }
                
                var token = localStorage.getItem('token');
                if (token) {
                    fetch(API_URL + '/auth/me', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    })
                        .then(function(response) { return response.json(); })
                        .then(function(data) {
                            if (!data.error) setUsuario(data);
                        })
                        .catch(function(error) { console.error(error); });
                }
            }, []);

            function voltarParaBusca() {
                navigate('/');
            }

            function handleVerPerfil(prestador) {
                setPrestadorSelecionado(prestador); 
                navigate('/perfil'); 
            }

            function handleLoginSuccess() {
                navigate('/dashboard');
            }

            function handleCadastroSucesso() {
                navigate('/');
            }

            function handleSair() {
                localStorage.removeItem('token'); 
                setUsuario(null); 
                navigate('/');
            }

            var header = null;
            if (modo !== 'avaliar') {
                var loginButton = null;
                if (!usuario) {
                    loginButton = React.createElement('button', {
                        onClick: function() { navigate('/login'); },
                        className: "px-4 py-2 rounded-xl border border-slate-200 hover:bg-slate-50"
                    }, "Entrar");
                } else {
                    loginButton = React.createElement('button', {
                        onClick: function() { navigate('/dashboard'); },
                        className: "px-4 py-2 rounded-xl bg-indigo-600 text-white"
                    }, "Dashboard");
                }

                var actionButton = null;
                if (modo === 'busca') {
                    actionButton = React.createElement('button', {
                        onClick: function() { navigate('/cadastro'); },
                        className: "px-4 py-2 rounded-xl bg-gradient-to-r from-emerald-600 to-emerald-700 text-white"
                    }, "Sou Prestador");
                } else {
                    actionButton = React.createElement('button', {
                        onClick: function() { navigate('/'); },
                        className: "px-4 py-2 rounded-xl bg-gradient-to-r from-emerald-600 to-emerald-700 text-white"
                    }, "Ver Busca");
                }

                header = React.createElement('header', { className: "bg-white/90 backdrop-blur-lg border-b border-slate-200 sticky top-0 z-50" },
                    React.createElement('div', { className: "max-w-7xl mx-auto px-4 py-3 flex justify-between items-center" },
                        React.createElement('div', {
                            onClick: voltarParaBusca,
                            className: "flex items-center gap-3 cursor-pointer"
                        },
                            React.createElement('div', { className: "w-10 h-10 rounded-2xl bg-gradient-to-br from-indigo-600 to-indigo-700 text-white grid place-items-center font-bold" }, "SL"),
                            React.createElement('h1', { className: "font-bold text-lg" }, "SemLimites")
                        ),
                        
                        React.createElement('div', { className: "flex gap-3" }, loginButton, actionButton)
                    )
                );
            }

            var content = null;
            if (modo === 'busca') {
                content = React.createElement(TelaBusca, { onVerPerfil: handleVerPerfil });
            } else if (modo === 'perfil') {
                content = React.createElement(TelaPerfil, { prestador: prestadorSelecionado, onVoltar: voltarParaBusca });
            } else if (modo === 'login') {
                content = React.createElement(Login, { onLoginSuccess: handleLoginSuccess, onVoltar: voltarParaBusca });
            } else if (modo === 'cadastro') {
                content = React.createElement(CadastroPrestador, { onCadastroSucesso: handleCadastroSucesso, onVoltar: voltarParaBusca });
            } else if (modo === 'dashboard') {
                content = React.createElement(DashboardPrestador, { usuario: usuario, onSair: handleSair });
            } else if (modo === 'avaliar') {
                content = React.createElement(AvaliarServico);
            }

            return React.createElement('div', { className: "min-h-screen bg-gradient-to-b from-slate-50 to-white" }, header, content);
        }

        ReactDOM.render(React.createElement(App), document.getElementById('root'));
    </script>
