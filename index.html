<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemLimites Prestadores</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonte Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Script para lidar com rotas no GitHub Pages -->
    <script>
        (function() {
            var redirect = sessionStorage.redirect;
            delete sessionStorage.redirect;
            if (redirect && redirect != location.href) {
                history.replaceState(null, null, redirect);
            }
        })();
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to bottom, #f8fafc, #ffffff);
            min-height: 100vh;
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <!-- React e ReactDOM -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <script>
        var _React = React;
        var useState = _React.useState;
        var useEffect = _React.useEffect;

        // ========== CONSTANTES ==========
        var CIDADES = ["Bauru", "Piratininga", "Agudos"];
        var CATEGORIAS = [
            "Eletricista", "Encanador", "Diarista", "Pedreiro", 
            "Montador de Móveis", "Ar-condicionado", "Pintor",
            "Jardineiro", "Marceneiro", "Vidraceiro"
        ];
        
        var API_URL = 'https://semlimites-api-rodrigo-b5ckghhkbxdqd7a8.canadacentral-01.azurewebsites.net/api';
        var BASE_PATH = '/SemLimites';

        // ========== UTILITÁRIOS ==========
        function cls() {
            var args = Array.prototype.slice.call(arguments);
            var result = [];
            for (var i = 0; i < args.length; i++) {
                if (args[i]) {
                    result.push(args[i]);
                }
            }
            return result.join(" ");
        }

        // ========== COMPONENTES DE UI ==========
        
        function Stars(props) {
            var value = props.value || 0;
            var size = props.size || "md";
            var showNumber = props.showNumber !== false;
            
            var full = Math.floor(value);
            var half = value - full >= 0.5;
            
            var sizeClasses = {
                sm: "text-sm", 
                md: "text-base", 
                lg: "text-xl", 
                xl: "text-2xl"
            };

            var stars = [];
            for (var i = 1; i <= 5; i++) {
                var className = "text-slate-200";
                if (i <= full) {
                    className = "bg-gradient-to-r from-amber-400 to-amber-500 bg-clip-text text-transparent";
                } else if (i === full + 1 && half) {
                    className = "bg-gradient-to-r from-amber-400 to-amber-500 bg-clip-text text-transparent";
                }
                className = className + " " + (sizeClasses[size] || "");
                stars.push(React.createElement('span', { key: i, className: className }, "★"));
            }

            var numberElement = null;
            if (showNumber) {
                numberElement = React.createElement('span', { className: "ml-1 text-sm font-semibold text-slate-700" }, value.toFixed(1));
            }

            return React.createElement('div', { className: "flex items-center gap-1" },
                React.createElement('div', { className: "flex" }, stars),
                numberElement
            );
        }

        function Badge(props) {
            var children = props.children;
            var variant = props.variant || "neutral";
            var size = props.size || "sm";
            
            var variants = {
                neutral: "bg-slate-100 text-slate-700 border-slate-200",
                verified: "bg-gradient-to-r from-emerald-50 to-teal-50 text-emerald-700 border-emerald-200",
                highlight: "bg-gradient-to-r from-indigo-600 to-indigo-700 text-white border-indigo-600"
            };
            
            var sizeClasses = {
                sm: "px-2 py-0.5 text-xs",
                md: "px-2.5 py-1 text-sm",
                lg: "px-3 py-1.5 text-base"
            };

            var className = "inline-flex items-center rounded-full border font-medium " + variants[variant] + " " + sizeClasses[size];
            
            return React.createElement('span', { className: className }, children);
        }

        function Avatar(props) {
            var name = props.name || "";
            var size = props.size || "md";
            
            var nameParts = name.split(' ');
            var initialsArray = [];
            for (var i = 0; i < nameParts.length; i++) {
                if (nameParts[i].length > 0) {
                    initialsArray.push(nameParts[i][0]);
                }
            }
            var initials = initialsArray.join('').slice(0, 2).toUpperCase();
            
            var sizeClasses = {
                sm: "w-8 h-8 text-xs", 
                md: "w-10 h-10 text-sm", 
                lg: "w-12 h-12 text-base",
                xl: "w-16 h-16 text-lg", 
                xxl: "w-24 h-24 text-2xl"
            };

            var colors = [
                "from-blue-500 to-indigo-600", 
                "from-emerald-500 to-teal-600",
                "from-amber-500 to-orange-600", 
                "from-rose-500 to-pink-600"
            ];
            
            var colorIndex = name.length % colors.length;
            
            var className = "rounded-2xl bg-gradient-to-br flex items-center justify-center font-semibold text-white shadow-md " + colors[colorIndex] + " " + sizeClasses[size];
            
            return React.createElement('div', { className: className }, initials);
        }

        // ========== COMPONENTE DE CRIAÇÃO DE SERVIÇO ==========
        function NovoServico(props) {
            var onSucesso = props.onSucesso;
            var onCancelar = props.onCancelar;
            
            var [formData, setFormData] = useState({
                clienteNome: '',
                clienteWhatsApp: '',
                clienteEmail: '',
                titulo: '',
                descricao: '',
                dataRealizacao: new Date().toISOString().split('T')[0],
                valor: ''
            });
            var [loading, setLoading] = useState(false);
            var [erro, setErro] = useState('');

            function formatarWhatsApp(valor) {
                var numeros = valor.replace(/\D/g, '');
                if (numeros.length <= 11) {
                    return numeros.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
                }
                return valor;
            }

            function handleChange(e) {
                var name = e.target.name;
                var value = e.target.value;
                
                if (name === 'clienteWhatsApp') {
                    setFormData({ ...formData, [name]: formatarWhatsApp(value) });
                } else {
                    setFormData({ ...formData, [name]: value });
                }
            }

            function handleSubmit(e) {
                e.preventDefault();
                setLoading(true);
                setErro('');

                var whatsappNumeros = formData.clienteWhatsApp.replace(/\D/g, '');
                if (whatsappNumeros.length < 10 || whatsappNumeros.length > 11) {
                    setErro('WhatsApp inválido. Digite um número com DDD');
                    setLoading(false);
                    return;
                }

                var dadosEnvio = {
                    clienteNome: formData.clienteNome,
                    clienteWhatsApp: whatsappNumeros,
                    clienteEmail: formData.clienteEmail,
                    titulo: formData.titulo,
                    descricao: formData.descricao,
                    dataRealizacao: formData.dataRealizacao,
                    valor: formData.valor ? parseFloat(formData.valor) : 0
                };

                fetch(API_URL + '/servicos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    },
                    body: JSON.stringify(dadosEnvio)
                })
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (data.error) {
                            throw new Error(data.error);
                        }
                        alert('✅ Serviço cadastrado com sucesso!');
                        onSucesso();
                    })
                    .catch(function(error) {
                        setErro(error.message);
                        setLoading(false);
                    });
            }

            var erroElement = null;
            if (erro) {
                erroElement = React.createElement('div', { className: "mb-4 p-3 rounded-lg bg-red-50 border border-red-200" },
                    React.createElement('p', { className: "text-sm text-red-600" }, erro)
                );
            }

            return React.createElement('div', { className: "bg-gradient-to-br from-indigo-50 to-white rounded-2xl p-6 border border-indigo-200 shadow-sm" },
                React.createElement('h3', { className: "text-lg font-semibold text-indigo-900 mb-4 flex items-center gap-2" },
                    React.createElement('svg', { className: "w-6 h-6", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                        React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M12 6v6m0 0v6m0-6h6m-6 0H6" })
                    ),
                    "Cadastrar Novo Serviço"
                ),

                erroElement,

                React.createElement('form', { onSubmit: handleSubmit, className: "space-y-4" },
                    React.createElement('div', { className: "grid md:grid-cols-2 gap-4" },
                        React.createElement('div', null,
                            React.createElement('label', { className: "block text-sm font-medium text-slate-700 mb-1" }, "Nome do Cliente *"),
                            React.createElement('input', {
                                type: "text",
                                name: "clienteNome",
                                value: formData.clienteNome,
                                onChange: handleChange,
                                required: true,
                                className: "w-full px-4 py-2 rounded-xl border border-slate-200 focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50"
                            })
                        ),
                        React.createElement('div', null,
                            React.createElement('label', { className: "block text-sm font-medium text-slate-700 mb-1" }, "WhatsApp *"),
                            React.createElement('input', {
                                type: "text",
                                name: "clienteWhatsApp",
                                value: formData.clienteWhatsApp,
                                onChange: handleChange,
                                required: true,
                                className: "w-full px-4 py-2 rounded-xl border border-slate-200 focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50",
                                placeholder: "(14) 99999-9999"
                            })
                        )
                    ),

                    React.createElement('div', { className: "grid md:grid-cols-2 gap-4" },
                        React.createElement('div', null,
                            React.createElement('label', { className: "block text-sm font-medium text-slate-700 mb-1" }, "Título do Serviço *"),
                            React.createElement('input', {
                                type: "text",
                                name: "titulo",
                                value: formData.titulo,
                                onChange: handleChange,
                                required: true,
                                className: "w-full px-4 py-2 rounded-xl border border-slate-200 focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50"
                            })
                        ),
                        React.createElement('div', null,
                            React.createElement('label', { className: "block text-sm font-medium text-slate-700 mb-1" }, "Data *"),
                            React.createElement('input', {
                                type: "date",
                                name: "dataRealizacao",
                                value: formData.dataRealizacao,
                                onChange: handleChange,
                                required: true,
                                className: "w-full px-4 py-2 rounded-xl border border-slate-200 focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50"
                            })
                        )
                    ),

                    React.createElement('div', null,
                        React.createElement('label', { className: "block text-sm font-medium text-slate-700 mb-1" }, "E-mail (opcional)"),
                        React.createElement('input', {
                            type: "email",
                            name: "clienteEmail",
                            value: formData.clienteEmail,
                            onChange: handleChange,
                            className: "w-full px-4 py-2 rounded-xl border border-slate-200 focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50",
                            placeholder: "cliente@email.com"
                        })
                    ),

                    React.createElement('div', null,
                        React.createElement('label', { className: "block text-sm font-medium text-slate-700 mb-1" }, "Descrição *"),
                        React.createElement('textarea', {
                            name: "descricao",
                            value: formData.descricao,
                            onChange: handleChange,
                            required: true,
                            rows: 3,
                            className: "w-full px-4 py-2 rounded-xl border border-slate-200 focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50"
                        })
                    ),

                    React.createElement('div', null,
                        React.createElement('label', { className: "block text-sm font-medium text-slate-700 mb-1" }, "Valor (opcional)"),
                        React.createElement('input', {
                            type: "number",
                            name: "valor",
                            value: formData.valor,
                            onChange: handleChange,
                            min: "0",
                            step: "0.01",
                            className: "w-full px-4 py-2 rounded-xl border border-slate-200 focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50",
                            placeholder: "0,00"
                        })
                    ),

                    React.createElement('div', { className: "flex gap-3 pt-4" },
                        React.createElement('button', {
                            type: "submit",
                            disabled: loading,
                            className: "flex-1 px-6 py-3 bg-gradient-to-r from-indigo-600 to-indigo-700 text-white font-semibold rounded-xl hover:shadow-lg disabled:opacity-50 transition"
                        }, loading ? 'Cadastrando...' : 'Cadastrar Serviço'),
                        React.createElement('button', {
                            type: "button",
                            onClick: onCancelar,
                            className: "px-6 py-3 border border-slate-200 rounded-xl text-slate-600 hover:bg-slate-50 transition"
                        }, "Cancelar")
                    )
                )
            );
        }

        // ========== COMPONENTE DE LISTAGEM DE SERVIÇOS ==========
        function MeusServicos() {
            var [servicos, setServicos] = useState([]);
            var [loading, setLoading] = useState(true);
            var [mostrarForm, setMostrarForm] = useState(false);
            var [filtro, setFiltro] = useState('todos');
            var [copiado, setCopiado] = useState(null);

            function carregarServicos() {
                setLoading(true);
                
                var url = API_URL + '/servicos/meus';
                if (filtro !== 'todos') {
                    url = url + '?status=' + filtro;
                }
                
                fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                })
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (data.servicos) {
                            setServicos(data.servicos);
                        }
                        setLoading(false);
                    })
                    .catch(function(error) {
                        console.error('Erro ao carregar serviços:', error);
                        setLoading(false);
                    });
            }

            useEffect(function() {
                carregarServicos();
            }, [filtro]);

            function handleCopiarLink(link) {
                navigator.clipboard.writeText(link);
                setCopiado(link);
                setTimeout(function() { setCopiado(null); }, 2000);
            }

            function handleEnviarWhatsApp(servico) {
                var mensagem = "Olá " + servico.clienteNome + "! 👋\n\n";
                mensagem = mensagem + "Você contratou " + servico.titulo + " pelo SemLimites.\n\n";
                mensagem = mensagem + "Por favor, avalie o serviço clicando no link abaixo:\n";
                mensagem = mensagem + servico.linkAvaliacao + "\n\n";
                mensagem = mensagem + "Sua avaliação é muito importante para nós! ⭐";
                
                window.open('https://wa.me/' + servico.clienteWhatsApp + '?text=' + encodeURIComponent(mensagem), '_blank');
            }

            function handleReenviarLink(id) {
                fetch(API_URL + '/servicos/' + id + '/reenviar', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                })
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (data.linkAvaliacao) {
                            alert('✅ Novo link gerado!');
                            carregarServicos();
                        }
                    })
                    .catch(function(error) {
                        alert('Erro ao gerar novo link');
                    });
            }

            function handleExcluir(id) {
                if (!window.confirm('Tem certeza que deseja excluir este serviço?')) {
                    return;
                }
                
                fetch(API_URL + '/servicos/' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                })
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (data.message) {
                            alert('✅ Serviço excluído!');
                            carregarServicos();
                        }
                    })
                    .catch(function(error) {
                        alert('Erro ao excluir serviço');
                    });
            }

            if (loading) {
                return React.createElement('div', { className: "text-center py-12" },
                    React.createElement('div', { className: "w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto mb-4" }),
                    React.createElement('p', { className: "text-slate-600" }, "Carregando serviços...")
                );
            }

            var servicosFiltrados = servicos;
            if (filtro !== 'todos') {
                servicosFiltrados = servicos.filter(function(s) { return s.status === filtro; });
            }

            return React.createElement('div', { className: "space-y-6" },
                React.createElement('div', { className: "flex justify-between items-center" },
                    React.createElement('h2', { className: "text-2xl font-bold text-slate-900" }, "Meus Serviços"),
                    React.createElement('button', {
                        onClick: function() { setMostrarForm(!mostrarForm); },
                        className: "px-4 py-2 bg-gradient-to-r from-indigo-600 to-indigo-700 text-white rounded-xl hover:shadow-lg transition flex items-center gap-2"
                    },
                        React.createElement('svg', { className: "w-5 h-5", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                            React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M12 4v16m8-8H4" })
                        ),
                        "Novo Serviço"
                    )
                ),

                mostrarForm && React.createElement(NovoServico, {
                    onSucesso: function() {
                        setMostrarForm(false);
                        carregarServicos();
                    },
                    onCancelar: function() { setMostrarForm(false); }
                }),

                React.createElement('div', { className: "flex gap-2 border-b border-slate-200 pb-4" },
                    React.createElement('button', {
                        onClick: function() { setFiltro('todos'); },
                        className: "px-4 py-2 rounded-xl text-sm font-medium transition " + (filtro === 'todos' ? 'bg-indigo-100 text-indigo-700' : 'text-slate-500 hover:bg-slate-100')
                    }, "Todos"),
                    React.createElement('button', {
                        onClick: function() { setFiltro('aguardando'); },
                        className: "px-4 py-2 rounded-xl text-sm font-medium transition " + (filtro === 'aguardando' ? 'bg-indigo-100 text-indigo-700' : 'text-slate-500 hover:bg-slate-100')
                    }, "Aguardando"),
                    React.createElement('button', {
                        onClick: function() { setFiltro('avaliado'); },
                        className: "px-4 py-2 rounded-xl text-sm font-medium transition " + (filtro === 'avaliado' ? 'bg-indigo-100 text-indigo-700' : 'text-slate-500 hover:bg-slate-100')
                    }, "Avaliados"),
                    React.createElement('button', {
                        onClick: function() { setFiltro('expirado'); },
                        className: "px-4 py-2 rounded-xl text-sm font-medium transition " + (filtro === 'expirado' ? 'bg-indigo-100 text-indigo-700' : 'text-slate-500 hover:bg-slate-100')
                    }, "Expirados")
                ),

                servicosFiltrados.length === 0 ?
                    React.createElement('div', { className: "text-center py-12 bg-slate-50 rounded-2xl border border-slate-200" },
                        React.createElement('svg', { className: "w-16 h-16 text-slate-300 mx-auto mb-4", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                            React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" })
                        ),
                        React.createElement('p', { className: "text-lg font-medium text-slate-700 mb-2" }, "Nenhum serviço encontrado"),
                        React.createElement('p', { className: "text-sm text-slate-500 mb-6" }, "Cadastre seu primeiro serviço para começar"),
                        React.createElement('button', {
                            onClick: function() { setMostrarForm(true); },
                            className: "px-6 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700"
                        }, "+ Novo Serviço")
                    ) :
                    React.createElement('div', { className: "grid gap-4" },
                        servicosFiltrados.map(function(s) {
                            var statusConfig = {
                                aguardando: { bg: 'bg-amber-50', text: 'text-amber-700', border: 'border-amber-200', label: 'Aguardando', icon: '⏳' },
                                avaliado: { bg: 'bg-emerald-50', text: 'text-emerald-700', border: 'border-emerald-200', label: 'Avaliado', icon: '✅' },
                                expirado: { bg: 'bg-slate-50', text: 'text-slate-500', border: 'border-slate-200', label: 'Expirado', icon: '⌛' }
                            };
                            var status = statusConfig[s.status] || statusConfig.aguardando;

                            var dataRealizacao = '';
                            if (s.dataRealizacao) {
                                dataRealizacao = new Date(s.dataRealizacao).toLocaleDateString('pt-BR');
                            }

                            return React.createElement('div', { 
                                key: s._id, 
                                className: "bg-white rounded-2xl border " + status.border + " overflow-hidden hover:shadow-lg transition-all"
                            },
                                React.createElement('div', { className: status.bg + " px-6 py-4 border-b " + status.border + " flex justify-between items-center" },
                                    React.createElement('div', { className: "flex items-center gap-3" },
                                        React.createElement('span', { className: "text-2xl" }, status.icon),
                                        React.createElement('div', null,
                                            React.createElement('h3', { className: "font-bold text-lg text-slate-900" }, s.titulo),
                                            React.createElement('p', { className: "text-sm text-slate-600" },
                                                s.clienteNome + " • " + dataRealizacao
                                            )
                                        )
                                    ),
                                    React.createElement('span', { className: "px-3 py-1 rounded-full text-xs font-medium " + status.bg + " " + status.text + " border " + status.border },
                                        status.label
                                    )
                                ),

                                React.createElement('div', { className: "p-6 space-y-4" },
                                    React.createElement('p', { className: "text-sm text-slate-600" }, s.descricao),

                                    s.valor > 0 && React.createElement('div', { className: "flex items-center gap-2 text-sm" },
                                        React.createElement('span', { className: "font-medium text-slate-700" }, "Valor:"),
                                        React.createElement('span', { className: "text-emerald-600 font-semibold" },
                                            "R$ " + s.valor.toFixed(2).replace('.', ',')
                                        )

        // ========== PÁGINA DE AVALIAÇÃO ==========
        function AvaliarServico() {
            var [loading, setLoading] = useState(true);
            var [erro, setErro] = useState('');
            var [servico, setServico] = useState(null);
            var [estrelas, setEstrelas] = useState(0);
            var [comentario, setComentario] = useState('');
            var [enviando, setEnviando] = useState(false);
            var [enviado, setEnviado] = useState(false);

            var pathParts = window.location.pathname.split('/');
            var token = pathParts[3] || pathParts[2];

            useEffect(function() {
                fetch(API_URL + '/servicos/avaliar/' + token)
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (data.servico) {
                            setServico(data.servico);
                        } else {
                            setErro('Link inválido ou expirado');
                        }
                        setLoading(false);
                    })
                    .catch(function(error) {
                        setErro(error.message);
                        setLoading(false);
                    });
            }, []);

            function handleSubmit(e) {
                e.preventDefault();
                if (estrelas === 0) {
                    alert('Selecione uma nota de 1 a 5 estrelas');
                    return;
                }

                setEnviando(true);

                fetch(API_URL + '/servicos/avaliar/' + token, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ estrelas: estrelas, comentario: comentario })
                })
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (data.success) {
                            setEnviado(true);
                            setTimeout(function() { navigate('/'); }, 3000);
                        } else {
                            setErro(data.error || 'Erro ao enviar avaliação');
                        }
                        setEnviando(false);
                    })
                    .catch(function(error) {
                        setErro(error.message);
                        setEnviando(false);

        // ========== TELA DE LOGIN ==========
        function Login(props) {
            var onLoginSuccess = props.onLoginSuccess;
            var onVoltar = props.onVoltar;
            
            var [email, setEmail] = useState('');
            var [senha, setSenha] = useState('');
            var [tipo, setTipo] = useState('cliente');
            var [modo, setModo] = useState('login');
            var [loading, setLoading] = useState(false);
            var [erro, setErro] = useState('');

            function handleSubmit(e) {
                e.preventDefault();
                setLoading(true);
                setErro('');

                var url = API_URL;
                var body = {};

                if (modo === 'login') {
                    url = url + '/auth/login';
                    body = { email: email, senha: senha, tipo: tipo };
                } else {
                    url = url + '/auth/register';
                    body = { email: email, senha: senha, tipo: tipo, nome: email.split('@')[0] };
                }

                fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                })
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (data.error) {
                            throw new Error(data.error);
                        }

                        if (modo === 'login') {
                            localStorage.setItem('token', data.token);
                            localStorage.setItem('user', JSON.stringify(data.user));
                            onLoginSuccess(data.user);
                        } else {
                            alert('Cadastro realizado! Faça login.');
                            setModo('login');
                        }
                        setLoading(false);
                    })
                    .catch(function(error) {
                        setErro(error.message);

                                value: email,
                                onChange: function(e) { setEmail(e.target.value); },

        // ========== TELA DE CADASTRO ==========
        function CadastroPrestador(props) {
            var onCadastroSucesso = props.onCadastroSucesso;
            var onVoltar = props.onVoltar;
            
            var [formData, setFormData] = useState({
                nome: '', 
                email: '', 
                senha: '',
                confirmarSenha: '',
                cnpj: '', 
                categoria: '', 
                cidade: 'Bauru',
                whatsapp: '', 
                telefone: '', 
                descricao: '', 
                tags: ''
            });
            var [etapa, setEtapa] = useState('form');
            var [verificacaoCNPJ, setVerificacaoCNPJ] = useState(null);
            var [loading, setLoading] = useState(false);
            var [erro, setErro] = useState('');

            function formatarCNPJ(valor) {
                var numeros = valor.replace(/\D/g, '');
                return numeros.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/, "$1.$2.$3/$4-$5");
            }

            function formatarTelefone(valor) {
                var numeros = valor.replace(/\D/g, '');
                if (numeros.length <= 10) {
                    return numeros.replace(/^(\d{2})(\d{4})(\d{4})$/, "($1) $2-$3");
                }
                return numeros.replace(/^(\d{2})(\d{5})(\d{4})$/, "($1) $2-$3");
            }

            function handleChange(e) {
                var name = e.target.name;
                var value = e.target.value;
                if (name === 'cnpj') {
                    setFormData({ ...formData, cnpj: formatarCNPJ(value) });
                } else if (name === 'whatsapp' || name === 'telefone') {
                    setFormData({ ...formData, [name]: formatarTelefone(value) });
                } else {
                    setFormData({ ...formData, [name]: value });
                }
            }

            function handleVerificarCNPJ() {
                var cnpjLimpo = formData.cnpj.replace(/\D/g, '');
                
                if (!formData.cnpj || cnpjLimpo.length !== 14) {
                    setErro('CNPJ inválido. Digite um CNPJ com 14 dígitos.');
                    return;
                }

                setLoading(true);
                setErro('');
                setEtapa('verificando');

                fetch(API_URL + '/prestadores/verificar-cnpj', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cnpj: formData.cnpj })
                })
                    .then(function(response) { return response.json(); })
                    .then(function(resultado) {
                        if (resultado.valido) {
                            setVerificacaoCNPJ(resultado);
                            setEtapa('verificado');
                            setFormData(function(prev) {
                                return {
                                    ...prev,
                                    nome: resultado.empresa.nomeFantasia || prev.nome,
                                    telefone: resultado.empresa.telefone || prev.telefone
                                };
                            });
                        } else {
                            setErro(resultado.motivo || 'CNPJ não encontrado na Receita Federal');
                            setEtapa('form');
                        }
                        setLoading(false);
                    })
                    .catch(function(error) {
                        setErro(error.message || 'Erro ao verificar CNPJ');
                        setEtapa('form');
                        setLoading(false);
                    });
            }

            function handleSubmit(e) {
                e.preventDefault();
                setLoading(true);
                setErro('');

                if (formData.senha.length < 6) {
                    setErro('A senha deve ter pelo menos 6 caracteres');
                    setLoading(false);
                    return;
                }

                if (formData.senha !== formData.confirmarSenha) {
                    setErro('As senhas não coincidem');
                    setLoading(false);
                    return;
                }

                var slug = formData.nome
                    .toLowerCase()
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '')
                    .replace(/[^a-z0-9]+/g, '-')
                    .replace(/^-|-$/g, '');

                var descricao = formData.descricao;
                if (!descricao) {
                    descricao = 'Profissional de ' + formData.categoria + ' em ' + formData.cidade + '. Entre em contato para orçamentos.';
                }

                var tagsArray = [];
                if (formData.tags) {
                    tagsArray = formData.tags.split(',').map(function(t) { return t.trim(); }).filter(function(t) { return t; });
                }

                var verificado = false;
                if (verificacaoCNPJ && verificacaoCNPJ.valido) {
                    verificado = true;
                }

                var dadosCNPJ = null;
                if (verificacaoCNPJ && verificacaoCNPJ.empresa) {
                    dadosCNPJ = verificacaoCNPJ.empresa;
                }

                var dataVerificacao = null;
                if (verificado) {
                    dataVerificacao = new Date();
                }

                fetch(API_URL + '/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: formData.email,
                        senha: formData.senha,
                        tipo: 'prestador',
                        nome: formData.nome,
                        slug: slug,
                        cnpj: formData.cnpj.replace(/\D/g, ''),
                        categoria: formData.categoria,
                        cidade: formData.cidade,
                        descricao: descricao,
                        whatsapp: formData.whatsapp.replace(/\D/g, ''),
                        telefone: formData.telefone.replace(/\D/g, ''),
                        tags: tagsArray,
                        verificado: verificado,
                        dadosCNPJ: dadosCNPJ,
                        dataVerificacaoCNPJ: dataVerificacao
                    })
                })
                    .then(function(response) { return response.json(); })
                    .then(function(registerData) {
                        if (registerData.error) {
                            throw new Error(registerData.error);
                        }
                        alert('✅ Prestador cadastrado com sucesso! Agora você pode fazer login.');
                        onCadastroSucesso();
                        setLoading(false);
                    })
                    .catch(function(error) {
                        setErro(error.message);
                        setLoading(false);
                    });
            }

            var categoriaOptions = [];
            categoriaOptions.push(React.createElement('option', { key: "empty", value: "" }, "Selecione"));
            for (var i = 0; i < CATEGORIAS.length; i++) {
                categoriaOptions.push(React.createElement('option', { key: CATEGORIAS[i], value: CATEGORIAS[i] }, CATEGORIAS[i]));
            }

            var erroElement = null;
            if (erro) {
                erroElement = React.createElement('div', { className: "mb-4 p-3 rounded-lg bg-red-50 border border-red-200" },
                    React.createElement('p', { className: "text-sm text-red-600" }, erro)
                );
            }

            var verificandoElement = null;
            if (etapa === 'verificando') {
                verificandoElement = React.createElement('div', { className: "p-3 rounded-lg bg-blue-50 border border-blue-200" },
                    React.createElement('p', { className: "text-sm text-blue-700" }, "🔍 Verificando CNPJ...")
                );
            }

            var validoElement = null;
            if (verificacaoCNPJ && verificacaoCNPJ.valido) {
                validoElement = React.createElement('div', { className: "p-3 rounded-lg bg-emerald-50 border border-emerald-200" },
                    React.createElement('p', { className: "text-sm text-emerald-700" }, "✓ CNPJ Válido")
                );
            }

            var botaoVerificar = null;
            if (etapa !== 'verificado') {
                var cnpjNumeros = formData.cnpj.replace(/\D/g, '');
                var disabled = loading || cnpjNumeros.length !== 14;
                botaoVerificar = React.createElement('button', {
                    type: "button",
                    onClick: handleVerificarCNPJ,
                    disabled: disabled,
                    className: "px-4 py-2 bg-indigo-600 text-white rounded-xl text-sm disabled:opacity-50"

                    params.push('cidade=' + encodeURIComponent(cidade));
                }
                if (categoria) {
                    params.push('categoria=' + encodeURIComponent(categoria));
                }
                if (buscaTexto) {
                    params.push('q=' + encodeURIComponent(buscaTexto));
                }
                
                url = url + params.join('&');
                
                fetch(url)
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (data.prestadores) {
                            setResultados(data.prestadores);
                        } else {

                    ),

        // ========== FUNÇÃO DE NAVEGAÇÃO COMPLETA ==========
        function navigate(path) {
            var fullPath = BASE_PATH + path;
            window.history.pushState({}, '', fullPath);
            
            if (path.startsWith('/avaliar/')) {
                window.appSetModo('avaliar');
            } else if (path === '/login') {
                window.appSetModo('login');
            } else if (path === '/cadastro') {
                window.appSetModo('cadastro');
            } else if (path === '/dashboard') {
                window.appSetModo('dashboard');
            } else if (path === '/perfil') {
                window.appSetModo('perfil');
            } else {
                window.appSetModo('busca');
            }
        }

        // ========== APP PRINCIPAL ==========
        function App() {
            var [modo, setModo] = useState('busca');
            var [usuario, setUsuario] = useState(null);
            var [prestadorSelecionado, setPrestadorSelecionado] = useState(null);

            window.appSetModo = setModo;

            useEffect(function() {
                var path = window.location.pathname.replace(BASE_PATH, '') || '/';
                
                if (path.startsWith('/avaliar/')) {
                    setModo('avaliar');
                } else if (path === '/login') {
                    setModo('login');
                } else if (path === '/cadastro') {
                    setModo('cadastro');
                } else if (path === '/dashboard') {
                    setModo('dashboard');
                } else {
                    setModo('busca');
                }
                
                var token = localStorage.getItem('token');
                if (token) {
                    fetch(API_URL + '/auth/me', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    })
                        .then(function(response) { return response.json(); })
                        .then(function(data) {
                            if (!data.error) setUsuario(data);
                        })
                        .catch(function(error) { console.error(error); });
                }
            }, []);

            function voltarParaBusca() {
                navigate('/');
            }

            function handleVerPerfil(prestador) {
                setPrestadorSelecionado(prestador); 
                navigate('/perfil'); 
            }

            function handleLoginSuccess() {
                navigate('/dashboard');
            }

            function handleCadastroSucesso() {
                navigate('/');
            }

            function handleSair() {
                localStorage.removeItem('token'); 
                setUsuario(null); 
                navigate('/');
            }

            var header = null;
            if (modo !== 'avaliar') {
                var loginButton = null;
                if (!usuario) {
                    loginButton = React.createElement('button', {
                        onClick: function() { navigate('/login'); },
                        className: "px-4 py-2 rounded-xl border border-slate-200 hover:bg-slate-50"
                    }, "Entrar");
                } else {
                    loginButton = React.createElement('button', {
                        onClick: function() { navigate('/dashboard'); },
                        className: "px-4 py-2 rounded-xl bg-indigo-600 text-white"
                    }, "Dashboard");
                }

                var actionButton = null;
                if (modo === 'busca') {
                    actionButton = React.createElement('button', {
                        onClick: function() { navigate('/cadastro'); },
                        className: "px-4 py-2 rounded-xl bg-gradient-to-r from-emerald-600 to-emerald-700 text-white"
                    }, "Sou Prestador");
                } else {
                    actionButton = React.createElement('button', {
                        onClick: function() { navigate('/'); },
                        className: "px-4 py-2 rounded-xl bg-gradient-to-r from-emerald-600 to-emerald-700 text-white"
                    }, "Ver Busca");
                }

                header = React.createElement('header', { className: "bg-white/90 backdrop-blur-lg border-b border-slate-200 sticky top-0 z-50" },
                    React.createElement('div', { className: "max-w-7xl mx-auto px-4 py-3 flex justify-between items-center" },
                        React.createElement('div', {
                            onClick: voltarParaBusca,
                            className: "flex items-center gap-3 cursor-pointer"
                        },
                            React.createElement('div', { className: "w-10 h-10 rounded-2xl bg-gradient-to-br from-indigo-600 to-indigo-700 text-white grid place-items-center font-bold" }, "SL"),
                            React.createElement('h1', { className: "font-bold text-lg" }, "SemLimites")
                        ),
                        
                        React.createElement('div', { className: "flex gap-3" }, loginButton, actionButton)
                    )
                );
            }

            var content = null;
            if (modo === 'busca') {
                content = React.createElement(TelaBusca, { onVerPerfil: handleVerPerfil });
            } else if (modo === 'perfil') {
                content = React.createElement(TelaPerfil, { prestador: prestadorSelecionado, onVoltar: voltarParaBusca });
            } else if (modo === 'login') {
                content = React.createElement(Login, { onLoginSuccess: handleLoginSuccess, onVoltar: voltarParaBusca });
            } else if (modo === 'cadastro') {
                content = React.createElement(CadastroPrestador, { onCadastroSucesso: handleCadastroSucesso, onVoltar: voltarParaBusca });
            } else if (modo === 'dashboard') {
                content = React.createElement(DashboardPrestador, { usuario: usuario, onSair: handleSair });
            } else if (modo === 'avaliar') {
                content = React.createElement(AvaliarServico);
            }

            return React.createElement('div', { className: "min-h-screen bg-gradient-to-b from-slate-50 to-white" }, header, content);
        }

        ReactDOM.render(React.createElement(App), document.getElementById('root'));
    </script>
